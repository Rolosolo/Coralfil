# .github/workflows/data_validation.yml
name: Validate Species Data

on:
  push:
    paths:
      - 'data/coral_species_database.csv'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install Dependencies
        run: pip install pandas great_expectations
      
      - name: Run Data Tests
        run: python ml/tests/validate_data.py